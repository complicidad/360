        const StatementModule = () => {
          const [rawText, setRawText] = useState('');
          const [transacciones, setTransacciones] = useState(null);
          const [tabActivo, setTabActivo] = useState('otros'); 

          const procesarTexto = () => {
            if (!rawText.trim()) return;
            const lineas = rawText.split('\n'); const nuevasTransacciones = [];
            lineas.forEach((linea, index) => {
              const str = linea.trim(); if (!str) return;
              const dateMatch = str.match(/^(\d{2}-\d{2})/); const amountMatch = str.match(/([\d,]*\.\d{2})(-)?$/);
              if (dateMatch && amountMatch) {
                const fecha = dateMatch[1]; let monto = parseFloat(amountMatch[1].replace(/,/g, '')); if (amountMatch[2] === '-') monto = -monto;
                let descripcion = "Movimiento Desconocido";
                const descMatch = str.match(/^\d{2}-\d{2}\s+(.+?)\s+(?:BPI|VEN|POS|INT|¥|AG\.|[0-9]{3}-[0-9]{3}|- )/);
                if (descMatch) descripcion = descMatch[1].trim(); else descripcion = str.split(/\s+/).slice(1, 4).join(' ');
                
                const descLower = descripcion.toLowerCase(); const isCobroYape = descLower.includes('cobro yape'); const isIngreso = monto > 0 && /(yape|plin|tran|abon|depo)/i.test(descLower);
                let categoria = 'otros'; if (isCobroYape) categoria = 'cobros'; else if (isIngreso) categoria = 'ingresos';
                nuevasTransacciones.push({ id: `tx-${Date.now()}-${index}`, fecha, descripcion, monto, categoria });
              }
            });
            setTransacciones(nuevasTransacciones); setTabActivo('otros'); 
          };

          const cambiarCategoria = (id, nuevaCategoria) => { setTransacciones(prev => prev.map(tx => tx.id === id ? { ...tx, categoria: nuevaCategoria } : tx )); };

          const { ingresos, cobros, otros, totales } = useMemo(() => {
            if (!transacciones) return { ingresos: [], cobros: [], otros: [], totales: {} };
            const ing = transacciones.filter(t => t.categoria === 'ingresos'); const cob = transacciones.filter(t => t.categoria === 'cobros'); const otr = transacciones.filter(t => t.categoria === 'otros');
            return { ingresos: ing, cobros: cob, otros: otr, totales: { ingresos: ing.reduce((sum, t) => sum + t.monto, 0), cobros: cob.reduce((sum, t) => sum + t.monto, 0), otros: otr.reduce((sum, t) => sum + t.monto, 0) } };
          }, [transacciones]);

          const formatCurrency = (amount) => new Intl.NumberFormat('es-PE', { style: 'currency', currency: 'PEN' }).format(amount);

          return (
            <div className="animate-fade-in max-w-5xl mx-auto space-y-6 pb-12">
              <header className="text-center space-y-2 mb-8">
                <h1 className="text-3xl font-black text-slate-900 flex items-center justify-center gap-3"><Calculator className="w-8 h-8 text-blue-600" /> Lector Rápido de Movimientos</h1>
                <p className="text-slate-500 font-medium">Analiza, clasifica y reorganiza tu Estado de Cuenta en segundos</p>
              </header>

              <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <label className="text-sm font-bold text-slate-700 flex items-center gap-2 mb-3"><AlignLeft className="h-4 w-4 text-blue-600" /> Pega aquí el texto del Estado de Cuenta</label>
                <div className="relative border border-slate-300 rounded-xl overflow-hidden focus-within:ring-2 focus-within:ring-blue-500 transition-all">
                  <textarea value={rawText} onChange={(e) => setRawText(e.target.value)} placeholder="Pega las líneas de tu estado de cuenta aquí..." className="block w-full h-32 p-4 outline-none resize-y text-sm font-mono text-slate-700 bg-slate-50 leading-relaxed whitespace-pre-wrap" />
                </div>
                <div className="mt-4 flex justify-end">
                  <button onClick={procesarTexto} disabled={!rawText.trim()} className="bg-blue-600 hover:bg-blue-700 disabled:bg-slate-300 text-white font-bold py-2.5 px-6 rounded-xl transition-all shadow-sm flex items-center gap-2">Analizar y Clasificar</button>
                </div>
              </div>

              {transacciones && (
                <div className="space-y-6 animate-fade-in-up">
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div onClick={() => setTabActivo('ingresos')} className={`bg-gradient-to-br from-emerald-500 to-teal-600 rounded-2xl p-6 text-white shadow-md flex flex-col justify-between cursor-pointer transition-all hover:scale-[1.02] ${tabActivo === 'ingresos' ? 'ring-4 ring-emerald-400 ring-offset-2 scale-[1.02]' : 'opacity-90'}`}>
                      <div><p className="text-emerald-100 font-bold mb-1 flex items-center gap-2"><TrendingUp className="w-4 h-4" /> Ingresos</p><h3 className="text-4xl font-black">{ingresos.length} <span className="text-lg font-bold opacity-80">abonos</span></h3></div>
                      <div className="mt-4 pt-4 border-t border-emerald-400/30"><p className="text-2xl font-black text-white">{formatCurrency(totales.ingresos)}</p></div>
                    </div>
                    <div onClick={() => setTabActivo('cobros')} className={`bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl p-6 text-white shadow-md flex flex-col justify-between cursor-pointer transition-all hover:scale-[1.02] ${tabActivo === 'cobros' ? 'ring-4 ring-indigo-400 ring-offset-2 scale-[1.02]' : 'opacity-90'}`}>
                      <div><p className="text-indigo-100 font-bold mb-1 flex items-center gap-2"><Receipt className="w-4 h-4" /> Cobros YAPE Emp.</p><h3 className="text-4xl font-black">{cobros.length} <span className="text-lg font-bold opacity-80">cobros</span></h3></div>
                      <div className="mt-4 pt-4 border-t border-indigo-400/30"><p className="text-2xl font-black text-rose-200">{formatCurrency(totales.cobros)}</p></div>
                    </div>
                    <div onClick={() => setTabActivo('otros')} className={`bg-white border border-slate-200 rounded-2xl p-6 flex flex-col justify-between cursor-pointer transition-all hover:scale-[1.02] ${tabActivo === 'otros' ? 'ring-4 ring-blue-400 ring-offset-2 scale-[1.02] shadow-lg' : 'shadow-sm opacity-90'}`}>
                      <div><p className="text-slate-500 font-bold mb-1 flex items-center gap-2"><ArrowRightLeft className="w-4 h-4" /> Otros Movimientos</p><h3 className="text-4xl font-black text-slate-800">{otros.length} <span className="text-lg font-bold text-slate-400">registros</span></h3></div>
                      <div className="mt-4 pt-4 border-t border-slate-100 flex items-center justify-between"><p className={`text-2xl font-black ${totales.otros < 0 ? 'text-rose-500' : 'text-slate-800'}`}>{formatCurrency(totales.otros)}</p><p className="text-sm font-bold text-blue-600 flex items-center gap-1 opacity-80">Ver detalles <List className="w-4 h-4"/></p></div>
                    </div>
                  </div>

                  <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div className="bg-slate-50 px-6 py-4 border-b border-slate-200 flex items-center justify-between">
                      <h2 className="text-lg font-bold text-slate-800 flex items-center gap-2">
                        {tabActivo === 'ingresos' && <><TrendingUp className="w-5 h-5 text-emerald-600" /> Detalle de Ingresos</>}
                        {tabActivo === 'cobros' && <><Receipt className="w-5 h-5 text-indigo-600" /> Detalle de Cobros Yape</>}
                        {tabActivo === 'otros' && <><List className="w-5 h-5 text-blue-600" /> Detalle de Otros Movimientos</>}
                      </h2>
                      <span className="text-xs font-black text-slate-500 bg-slate-200 px-3 py-1 rounded-full">{tabActivo === 'ingresos' ? ingresos.length : (tabActivo === 'cobros' ? cobros.length : otros.length)} elementos</span>
                    </div>
                    
                    <div className="overflow-x-auto max-h-[500px] overflow-y-auto">
                      <table className="w-full text-sm text-left text-slate-600">
                        <thead className="text-xs text-slate-500 uppercase bg-white border-b sticky top-0 z-10 shadow-sm"><tr><th className="px-6 py-4 font-bold w-24">Fecha</th><th className="px-6 py-4 font-bold">Descripción</th><th className="px-6 py-4 font-bold text-right">Monto</th><th className="px-6 py-4 font-bold text-center bg-slate-50 border-l border-slate-100 w-48">Mover a...</th></tr></thead>
                        <tbody>
                          {(tabActivo === 'ingresos' ? ingresos : (tabActivo === 'cobros' ? cobros : otros)).map((mov) => (
                            <tr key={mov.id} className="border-b hover:bg-slate-50 transition-colors group">
                              <td className="px-6 py-3 whitespace-nowrap font-mono font-medium text-slate-500">{mov.fecha}</td>
                              <td className="px-6 py-3 font-bold text-slate-800">{mov.descripcion}</td>
                              <td className={`px-6 py-3 text-right font-bold font-mono ${mov.monto >= 0 ? 'text-emerald-600' : 'text-rose-500'}`}>{mov.monto > 0 ? '+' : ''}{formatCurrency(mov.monto)}</td>
                              <td className="px-4 py-2 border-l border-slate-100 bg-slate-50/50">
                                <div className="flex items-center justify-center gap-2">
                                  <FolderSync className="w-4 h-4 text-slate-400 group-hover:text-blue-500 transition-colors" />
                                  <select value={mov.categoria} onChange={(e) => cambiarCategoria(mov.id, e.target.value)} className="bg-white border border-slate-300 font-bold text-slate-700 text-xs rounded focus:ring-blue-500 outline-none w-full p-1.5 cursor-pointer">
                                    <option value="ingresos">Ingreso</option><option value="cobros">Cobro Yape</option><option value="otros">Otros</option>
                                  </select>
                                </div>
                              </td>
                            </tr>
                          ))}
                          {(tabActivo === 'ingresos' ? ingresos : (tabActivo === 'cobros' ? cobros : otros)).length === 0 && (
                            <tr><td colSpan="4" className="px-6 py-12 text-center text-slate-500"><div className="flex flex-col items-center justify-center space-y-2"><div className="bg-slate-100 p-3 rounded-full"><List className="w-6 h-6 text-slate-400" /></div><p className="font-bold">No hay movimientos en esta categoría.</p></div></td></tr>
                          )}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        };

        // ==========================================
        // COMPONENTE PRINCIPAL (SUPER APP SHELL)
        // ==========================================
        function App() {
          const [activeModule, setActiveModule] = useState('finance-dashboard');
          const [notification, setNotification] = useState(null);
          const [sidebarOpen, setSidebarOpen] = useState(true);

          // Estados globales elevados para cruce de datos
          const [cashFlow, setCashFlow] = useState(initialCashFlow);
          const [kpis, setKpis] = useState(null);

          useEffect(() => {
            if(notification) { const timer = setTimeout(() => setNotification(null), 4000); return () => clearTimeout(timer); }
          }, [notification]);

          const NavItem = ({ id, icon: Icon, label, group }) => (
             <button 
                onClick={() => setActiveModule(id)} 
                className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all mb-1 ${activeModule === id ? 'bg-blue-600 text-white shadow-md font-bold' : 'text-slate-400 hover:bg-slate-800 hover:text-white font-medium'}`}
             >
                <Icon size={18} className={activeModule === id ? 'text-blue-200' : ''} />
                <span>{label}</span>
             </button>
          );

          return (
            <div className="flex h-screen w-full bg-slate-50 overflow-hidden text-slate-800 font-sans">
              
              {/* Notificaciones Globales */}
              {notification && (
                <div className={`fixed top-4 right-4 z-[100] bg-white border-l-4 ${notification.type === 'error' ? 'border-rose-500' : 'border-emerald-500'} shadow-xl rounded-r-lg p-4 flex items-center gap-3 animate-fade-in`}>
                  {notification.type === 'error' ? <AlertCircle className="text-rose-500" size={20} /> : <CheckCircle2 className="text-emerald-500" size={20} />}
                  <p className="text-sm font-bold text-slate-700">{notification.msg}</p>
                </div>
              )}

              {/* Sidebar Navegación Maestra */}
              <aside className={`bg-slate-950 flex flex-col flex-shrink-0 transition-all duration-300 ${sidebarOpen ? 'w-64' : 'w-20'} z-50`}>
                 <div className="p-5 flex items-center justify-between border-b border-slate-800">
                    {sidebarOpen && <h1 className="text-xl font-black text-white tracking-tight flex items-center gap-2"><Zap className="text-amber-400 fill-amber-400" size={20}/> Suite 360</h1>}
                    <button onClick={() => setSidebarOpen(!sidebarOpen)} className="text-slate-400 hover:text-white p-1 rounded-md bg-slate-900"><Menu size={20}/></button>
                 </div>
                 
                 <div className="flex-1 overflow-y-auto hide-scroll p-3 space-y-6 mt-2">
                    {/* Inteligencia 360 */}
                    <div>
                       {sidebarOpen && <p className="text-[10px] text-slate-500 uppercase tracking-widest font-bold mb-2 ml-2">Inteligencia</p>}
                       <NavItem id="client-360" icon={Globe} label={sidebarOpen ? "Visión 360°" : ""} />
                    </div>

                    {/* Grupo Finanzas */}
                    <div>
                       {sidebarOpen && <p className="text-[10px] text-slate-500 uppercase tracking-widest font-bold mb-2 ml-2">Finanzas</p>}
                       <NavItem id="finance-dashboard" icon={LayoutDashboard} label={sidebarOpen ? "Dashboard" : ""} />
                       <NavItem id="finance-cashflow" icon={Wallet} label={sidebarOpen ? "Flujo de Caja" : ""} />
                       <NavItem id="finance-subscriptions" icon={ShieldCheck} label={sidebarOpen ? "Suscripciones" : ""} />
                       <NavItem id="finance-settings" icon={Settings} label={sidebarOpen ? "Configuración" : ""} />
                    </div>

                    {/* Grupo B2B CRM */}
                    <div>
                       {sidebarOpen && <p className="text-[10px] text-slate-500 uppercase tracking-widest font-bold mb-2 ml-2">B2B & CRM</p>}
                       <NavItem id="crm-analytics" icon={BarChart2} label={sidebarOpen ? "Analizador Excel" : ""} />
                    </div>

                    {/* Grupo Utilidades */}
                    <div>
                       {sidebarOpen && <p className="text-[10px] text-slate-500 uppercase tracking-widest font-bold mb-2 ml-2">Herramientas</p>}
                       <NavItem id="tools-parser" icon={FileText} label={sidebarOpen ? "Lector EC Banco" : ""} />
                    </div>
                 </div>
              </aside>

              {/* Área Principal Contenido */}
              <main className="flex-1 h-screen overflow-y-auto p-4 md:p-8 bg-slate-50/50">
                 
                 {/* Módulo Cliente 360 */}
                 <div className={activeModule === 'client-360' ? 'block' : 'hidden'}>
                     <Client360Module cashFlow={cashFlow} kpis={kpis} />
                 </div>

                 {/* Módulo de Finanzas */}
                 <div className={activeModule.startsWith('finance') ? 'block' : 'hidden'}>
                     <FinanceModule activeSubTab={activeModule.replace('finance-', '')} setNotification={setNotification} cashFlow={cashFlow} setCashFlow={setCashFlow} />
                 </div>

                 {/* Módulo CRM */}
                 <div className={activeModule === 'crm-analytics' ? 'block' : 'hidden'}>
                     <CrmModule setNotification={setNotification} kpis={kpis} setKpis={setKpis} />
                 </div>

                 {/* Módulo Parser */}
                 <div className={activeModule === 'tools-parser' ? 'block' : 'hidden'}>
                     <StatementModule />
                 </div>

              </main>
            </div>
          );
        }

        const rootElement = document.getElementById('root');
        const root = createRoot(rootElement);
        root.render(<App />);

    </script>
</body>
</html>
