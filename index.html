<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Suite | GestorPro 360</title>
    
    <!-- Frameworks & Bibliotecas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .animate-fade-in-up { animation: fadeInUp 0.5s ease-out forwards; }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased overflow-hidden">
    
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useMemo, useEffect, useRef } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        import { 
          // Iconos Generales & Navegación
          LayoutDashboard, Wallet, Users, Settings, Database, Briefcase, FileText, Menu,
          // Iconos Finanzas
          Plus, TrendingUp, TrendingDown, AlertCircle, X, CheckCircle2, Clock, Zap, ExternalLink, Loader2, RefreshCw, Copy, Calendar, Globe, Search, Edit2, AlertTriangle, ShieldCheck,
          // Iconos CRM & Analytics
          UploadCloud, BarChart2, Package, Truck, Lightbulb, MessageCircle, Flame, Star, Activity, BadgeCheck, CheckCircle,
          // Iconos Parser
          AlignLeft, Calculator, List, Receipt, ArrowRightLeft, FolderSync
        } from 'https://esm.sh/lucide-react@0.263.1';

        // ==========================================
        // UTILERÍAS COMPARTIDAS Y GRÁFICOS (CORE)
        // ==========================================
        const safeJSONParse = (str) => {
          if (!str) return {};
          try { return JSON.parse(str); } catch (e) { return {}; }
        };

        const parseSafeDate = (val) => {
          if (!val) return null;
          if (val instanceof Date) return isNaN(val.getTime()) ? null : val;
          if (typeof val === 'number') {
            const d = new Date(Math.round((val - 25569) * 86400 * 1000));
            return isNaN(d.getTime()) ? null : d;
          }
          if (typeof val === 'string') {
            let str = val.replace(' ', 'T');
            let d = new Date(str);
            if (!isNaN(d.getTime())) return d;
            const parts = val.split(/[\/\-\s]/);
            if (parts.length >= 3 && parts[2].length === 4) {
              d = new Date(`${parts[2]}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}T00:00:00`);
              if (!isNaN(d.getTime())) return d;
            }
          }
          return null;
        };

        const formatSafeDateString = (val) => {
          if (!val) return '';
          const d = parseSafeDate(val);
          if (d) {
            const day = String(d.getDate()).padStart(2, '0');
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const year = d.getFullYear();
            const hours = String(d.getHours()).padStart(2, '0');
            const mins = String(d.getMinutes()).padStart(2, '0');
            return `${day}/${month}/${year} ${hours}:${mins}`;
          }
          return String(val || '').substring(0, 10);
        };

        const formatNiceDateOnly = (val) => {
          if (!val) return '';
          const d = parseSafeDate(val);
          if (d) {
            const day = String(d.getDate()).padStart(2, '0');
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const year = d.getFullYear();
            return `${day}/${month}/${year}`;
          }
          return String(val || '').substring(0, 10);
        };

        const ChartComponent = ({ type, data, options }) => {
            const canvasRef = useRef(null);
            const chartRef = useRef(null);

            useEffect(() => {
                const ctx = canvasRef.current.getContext('2d');
                Chart.defaults.font.family = 'ui-sans-serif, system-ui, sans-serif';
                if (chartRef.current) chartRef.current.destroy();
                chartRef.current = new Chart(ctx, { type, data, options });
                return () => { if (chartRef.current) chartRef.current.destroy(); };
            }, [data, options, type]);

            return <canvas ref={canvasRef} />;
        };

        const initialCashFlow = [];
        const addMonthsToDate = (dateStr, months) => {
          const date = new Date(dateStr + 'T00:00:00'); 
          date.setMonth(date.getMonth() + Number(months));
          return date.toISOString().split('T')[0];
        };
        const calculateSubStatus = (endDateStr) => {
            const today = new Date();
            const endDate = new Date(endDateStr + 'T00:00:00');
            const diffTime = endDate - today;
            const remainingDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            return { remainingDays, status: remainingDays < 0 ? 'CORTE' : 'ACTIVO' };
        };

        const appsScriptCode = `function doPost(e) {
  try {
    var data = JSON.parse(e.postData.contents);
    var action = data.action;
    var payload = data.payload;
    var ss = SpreadsheetApp.getActiveSpreadsheet();

    if (action === "saveCashFlow") {
      var sheet = ss.getSheetByName("FlujoDeCaja");
      if(sheet) sheet.appendRow([payload.id, payload.date, payload.client, payload.concept, payload.monto, payload.method, payload.voucher, payload.voucherUrl, payload.notes, payload.category]);
      return ContentService.createTextOutput(JSON.stringify({"status": "success"})).setMimeType(ContentService.MimeType.JSON);
    } 
    else if (action === "updateCashFlow") {
      var sheet = ss.getSheetByName("FlujoDeCaja");
      if(sheet) {
        var dataRange = sheet.getDataRange();
        var values = dataRange.getValues();
        for (var i = 1; i < values.length; i++) {
          if (values[i][0] == payload.id) {
            sheet.getRange(i + 1, 2, 1, 9).setValues([[
              payload.date, payload.client, payload.concept, payload.monto,
              payload.method, payload.voucher, payload.voucherUrl, payload.notes, payload.category
            ]]);
            break;
          }
        }
      }
      return ContentService.createTextOutput(JSON.stringify({"status": "success"})).setMimeType(ContentService.MimeType.JSON);
    }
  } catch (error) {
    return ContentService.createTextOutput(JSON.stringify({"status": "error", "msg": error.message})).setMimeType(ContentService.MimeType.JSON);
  }
}

function doGet(e) {
  try {
    var ss = SpreadsheetApp.getActiveSpreadsheet();
    var response = { cashFlow: [] };

    var sheetCaja = ss.getSheetByName("FlujoDeCaja");
    if (sheetCaja) {
      var dataCaja = sheetCaja.getDataRange().getValues();
      dataCaja.shift();
      response.cashFlow = dataCaja.map(function(row) {
        return { 
          id: row[0], date: row[1] instanceof Date ? row[1].toISOString() : row[1], client: row[2], concept: row[3], monto: row[4], 
          method: row[5], voucher: row[6], voucherUrl: row[7], notes: row[8], category: row[9]
        };
      });
    }
    return ContentService.createTextOutput(JSON.stringify(response)).setMimeType(ContentService.MimeType.JSON);
  } catch (error) {
    return ContentService.createTextOutput(JSON.stringify({"status": "error", "msg": error.message})).setMimeType(ContentService.MimeType.JSON);
  }
}`;

        // ==========================================
        // MÓDULO: VISIÓN CLIENTE 360° (Directorio + Perfil)
        // ==========================================
        const Client360Module = ({ cashFlow, kpis }) => {
            const [searchTerm, setSearchTerm] = useState('');
            const [result, setResult] = useState(null);
            const [hasSearched, setHasSearched] = useState(false);
            const [activeList, setActiveList] = useState(null);
            
            // Estado para el detalle de pedidos
            const [activeOrderTab, setActiveOrderTab] = useState(null); 

            const performSearch = (termToSearch) => {
                if (!termToSearch || termToSearch.trim().length < 3) return;
                setSearchTerm(termToSearch);
                setHasSearched(true);
                setActiveOrderTab(null); // Reseteamos la vista de pedidos

                const termClean = termToSearch.replace(/\D/g, '');
                const termLower = termToSearch.toLowerCase();

                let crmUser = null; let crmConfig = null; let crmOrders = [];
                
                // 1. Buscar en CRM
                if (kpis && kpis.raw) {
                    const matchedUID = Object.keys(kpis.raw.usersMap).find(uid => {
                        const u = kpis.raw.usersMap[uid];
                        const matchPhone = termClean.length >= 3 && (u.phone || '').replace(/\D/g, '').includes(termClean);
                        const matchName = (u.name || '').toLowerCase().includes(termLower);
                        const matchId = uid.toLowerCase() === termLower;
                        return matchPhone || matchName || matchId;
                    });

                    if (matchedUID) {
                        crmUser = kpis.raw.usersMap[matchedUID];
                        crmConfig = kpis.raw.configDict[matchedUID];
                        crmOrders = kpis.raw.orders.filter(ord => (ord.MerchantID || ord.UID) === matchedUID);
                        crmOrders.sort((a,b) => (parseSafeDate(b.Date || b.date || b.CreatedAt) || new Date(0)) - (parseSafeDate(a.Date || a.date || a.CreatedAt) || new Date(0)));
                    }
                }

                // 2. Buscar en Finanzas
                let finPayments = [];
                if (cashFlow && cashFlow.length > 0) {
                    finPayments = cashFlow.filter(item => {
                        const cStr = String(item.client || '');
                        const cClean = cStr.replace(/\D/g, '');
                        const cLower = cStr.toLowerCase();
                        
                        let matched = false;
                        if (termClean.length >= 3 && cClean.includes(termClean)) matched = true;
                        else if (termLower.length >= 3 && cLower.includes(termLower)) matched = true;
                        else if (crmUser) {
                            const searchPhone = (crmUser.phone || '').replace(/\D/g, '');
                            const searchName = (crmUser.name || '').toLowerCase();
                            if (searchPhone.length >= 3 && cClean.includes(searchPhone)) matched = true;
                            else if (searchName.length >= 3 && cLower.includes(searchName)) matched = true;
                        }
                        return matched;
                    }).sort((a,b) => new Date(b.date) - new Date(a.date));
                }

                if (!crmUser && finPayments.length === 0) {
                    setResult(null);
                } else {
                    let subDetails = null; let ltv = 0;
                    finPayments.forEach(p => { if (p.income > 0) ltv += p.income; });

                    const ascPayments = [...finPayments].reverse();
                    let subObj = { startDate: null, endDate: null, activeMonths: 0 };
                    
                    ascPayments.forEach(entry => {
                        if (entry.income > 0) {
                            const conceptStr = String(entry.concept || '');
                            const match = conceptStr.match(/x\s*(\d+)\s*mes/i);
                            const months = match ? parseInt(match[1]) : 0;
                            const isSaas = entry.category && entry.category.includes('SaaS');
                            const wasFormalOrInformalBeforeUpdate = !entry.category && entry.voucher; 
                            
                            if (months > 0 && (isSaas || wasFormalOrInformalBeforeUpdate)) {
                                if (!subObj.startDate) {
                                    subObj.startDate = entry.date; subObj.endDate = addMonthsToDate(entry.date, months); subObj.activeMonths = months;
                                } else {
                                    const baseDate = new Date(subObj.endDate) > new Date(entry.date) ? subObj.endDate : entry.date;
                                    subObj.endDate = addMonthsToDate(baseDate, months); subObj.activeMonths += months;
                                }
                            }
                        }
                    });

                    if (subObj.endDate) {
                        const { remainingDays, status } = calculateSubStatus(subObj.endDate);
                        subDetails = { ...subObj, remainingDays, status };
                    }

                    setResult({ crm: crmUser ? { user: crmUser, config: crmConfig, orders: crmOrders } : null, finance: { payments: finPayments, sub: subDetails, ltv } });
                }
            };

            const handleSearchSubmit = (e) => {
                e.preventDefault();
                performSearch(searchTerm);
            };

            const leadsPro = kpis?.leads?.pro || [];
            const leadsPrueba = kpis?.leads?.prueba || [];
            const leadsUsados = kpis?.leads?.usados || [];
            const leadsNuevos = kpis?.leads?.nuevos || [];

            const renderActiveList = () => {
                if (!activeList) return null;
                let data = []; let title = ''; let color = '';
                if (activeList === 'PRO') { data = leadsPro; title = 'Comercios PRO Pagados'; color = 'text-blue-700 bg-blue-50 border-blue-200'; }
                if (activeList === 'PRUEBA') { data = leadsPrueba; title = 'Comercios en Prueba Activa'; color = 'text-indigo-700 bg-indigo-50 border-indigo-200'; }
                if (activeList === 'USADOS') { data = leadsUsados; title = 'Comercios con Trial Vencido'; color = 'text-slate-700 bg-slate-100 border-slate-300'; }
                if (activeList === 'NUEVOS') { data = leadsNuevos; title = 'Comercios Nuevos sin Trial'; color = 'text-emerald-700 bg-emerald-50 border-emerald-200'; }

                return (
                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 mb-8 overflow-hidden animate-fade-in">
                        <div className={`p-4 border-b flex justify-between items-center ${color}`}>
                            <h3 className="font-black text-lg flex items-center gap-2"><Users size={20}/> Directorio: {title} ({data.length})</h3>
                            <button onClick={() => setActiveList(null)} className="p-1 hover:bg-black/10 rounded-lg transition-colors"><X size={20}/></button>
                        </div>
                        <div className="max-h-[350px] overflow-y-auto">
                            <table className="w-full text-left text-sm">
                                <thead className="bg-slate-50 sticky top-0 shadow-sm z-10">
                                    <tr><th className="p-3 text-slate-500 font-bold">Comercio</th><th className="p-3 text-slate-500 font-bold">Teléfono</th><th className="p-3 text-slate-500 font-bold text-center">Pedidos</th><th className="p-3 text-slate-500 font-bold text-center">Vencimiento Prueba</th><th className="p-3 text-slate-500 font-bold text-center">Acciones</th></tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {data.map(u => (
                                        <tr key={u.id} className="hover:bg-slate-50">
                                            <td className="p-3"><span className="font-bold text-slate-800">{u.name || 'Sin Nombre'}</span><br/><span className="text-[10px] text-slate-400 font-mono">{u.id}</span></td>
                                            <td className="p-3 font-medium text-slate-700">{u.phone || 'N/A'}</td>
                                            <td className="p-3 text-center font-black text-slate-700">{u.ordenes}</td>
                                            <td className="p-3 text-center text-xs font-medium text-slate-500">{u.trialEndFormatted || '-'}</td>
                                            <td className="p-3 text-center flex justify-center gap-2">
                                                <button onClick={() => { performSearch(u.id); window.scrollTo({top: 400, behavior: 'smooth'}); }} className="inline-flex items-center gap-1 bg-blue-100 hover:bg-blue-200 text-blue-700 px-3 py-1.5 rounded-lg text-xs font-bold transition-colors"><Search size={14}/> Ver 360°</button>
                                                {u.phone && <a href={`https://wa.me/51${String(u.phone).replace(/\D/g,'')}`} target="_blank" rel="noreferrer" className="inline-flex items-center gap-1 bg-[#25D366] hover:bg-[#20ba59] text-white px-3 py-1.5 rounded-lg text-xs font-bold transition-colors"><MessageCircle size={14}/> Chat</a>}
                                            </td>
                                        </tr>
                                    ))}
                                    {data.length === 0 && <tr><td colSpan="5" className="p-8 text-center text-slate-400 font-bold">No hay clientes en esta lista.</td></tr>}
                                </tbody>
                            </table>
                        </div>
                    </div>
                )
            };

            // Helpers para los estados de pedido
            let ordersEnviados = [];
            let ordersPendientes = [];
            let ordersEliminados = [];

            if (result && result.crm) {
                ordersEnviados = result.crm.orders.filter(o => o.Status === 'ENVIADO');
                ordersPendientes = result.crm.orders.filter(o => o.Status === 'PENDIENTE');
                ordersEliminados = result.crm.orders.filter(o => o.Status === 'ELIMINADO' || o.Status === 'CANCELADO' || o.Status === 'RECHAZADO');
            }

            return (
                <div className="animate-fade-in-up max-w-7xl mx-auto space-y-6 pb-12">
                    
                    {/* Tarjetas de Segmentación CRM (Directorio Global) */}
                    {kpis && (
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-2">
                            <div onClick={() => setActiveList(activeList === 'PRO' ? null : 'PRO')} className={`p-5 rounded-2xl border cursor-pointer transition-all hover:-translate-y-1 ${activeList === 'PRO' ? 'bg-blue-50 border-blue-400 ring-2 ring-blue-400/20' : 'bg-white border-slate-200 hover:border-blue-300 shadow-sm'}`}>
                                <div className="flex justify-between items-center"><span className="text-blue-600 font-black tracking-wide uppercase text-xs">Pro Pagados</span><BadgeCheck size={20} className="text-blue-500"/></div>
                                <p className="text-3xl font-black text-slate-800 mt-3">{leadsPro.length}</p>
                            </div>
                            <div onClick={() => setActiveList(activeList === 'PRUEBA' ? null : 'PRUEBA')} className={`p-5 rounded-2xl border cursor-pointer transition-all hover:-translate-y-1 ${activeList === 'PRUEBA' ? 'bg-indigo-50 border-indigo-400 ring-2 ring-indigo-400/20' : 'bg-white border-slate-200 hover:border-indigo-300 shadow-sm'}`}>
                                <div className="flex justify-between items-center"><span className="text-indigo-600 font-black tracking-wide uppercase text-xs">En Prueba</span><Clock size={20} className="text-indigo-500"/></div>
                                <p className="text-3xl font-black text-slate-800 mt-3">{leadsPrueba.length}</p>
                            </div>
                            <div onClick={() => setActiveList(activeList === 'USADOS' ? null : 'USADOS')} className={`p-5 rounded-2xl border cursor-pointer transition-all hover:-translate-y-1 ${activeList === 'USADOS' ? 'bg-slate-100 border-slate-400 ring-2 ring-slate-400/20' : 'bg-white border-slate-200 hover:border-slate-300 shadow-sm'}`}>
                                <div className="flex justify-between items-center"><span className="text-slate-600 font-black tracking-wide uppercase text-xs">Trial Vencido</span><AlertTriangle size={20} className="text-slate-500"/></div>
                                <p className="text-3xl font-black text-slate-800 mt-3">{leadsUsados.length}</p>
                            </div>
                            <div onClick={() => setActiveList(activeList === 'NUEVOS' ? null : 'NUEVOS')} className={`p-5 rounded-2xl border cursor-pointer transition-all hover:-translate-y-1 ${activeList === 'NUEVOS' ? 'bg-emerald-50 border-emerald-400 ring-2 ring-emerald-400/20' : 'bg-white border-slate-200 hover:border-emerald-300 shadow-sm'}`}>
                                <div className="flex justify-between items-center"><span className="text-emerald-600 font-black tracking-wide uppercase text-xs">Sin Usar Trial</span><Zap size={20} className="text-emerald-500"/></div>
                                <p className="text-3xl font-black text-slate-800 mt-3">{leadsNuevos.length}</p>
                            </div>
                        </div>
                    )}

                    {renderActiveList()}

                    <div className="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 text-center">
                        <h2 className="text-3xl font-black text-slate-800 flex justify-center items-center gap-3 mb-3">
                           <Globe className="text-blue-600 w-8 h-8"/> Buscador Cliente 360°
                        </h2>
                        <p className="text-slate-500 mb-8 font-medium">Busca un comercio por teléfono, ID o nombre para extraer el 100% de sus datos financieros y operativos.</p>
                        
                        <form onSubmit={handleSearchSubmit} className="max-w-2xl mx-auto relative group">
                           <Search className="absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-blue-500 transition-colors" size={24}/>
                           <input 
                               type="text" 
                               placeholder="Ej. 987654321, ID de Tienda o Nombre" 
                               className="w-full pl-14 pr-36 py-5 rounded-2xl border-2 border-slate-200 focus:border-blue-500 outline-none text-lg shadow-sm transition-all bg-slate-50 focus:bg-white"
                               value={searchTerm}
                               onChange={e => setSearchTerm(e.target.value)}
                           />
                           <button type="submit" className="absolute right-3 top-1/2 -translate-y-1/2 bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl font-bold transition-all shadow-md hover:shadow-lg">
                               Buscar 360°
                           </button>
                        </form>
                        
                        {(!kpis || cashFlow.length === 0) && (
                            <div className="mt-6 inline-flex items-center gap-2 bg-amber-50 text-amber-700 px-5 py-2.5 rounded-xl text-sm font-bold border border-amber-200">
                                <AlertTriangle size={18}/> Sube el Excel B2B y conecta la Base de Finanzas para un escaneo completo.
                            </div>
                        )}
                    </div>

                    {hasSearched && !result && (
                         <div className="text-center py-16 bg-white rounded-2xl border border-slate-200 shadow-sm animate-fade-in">
                            <AlertCircle className="mx-auto text-slate-300 w-20 h-20 mb-4"/>
                            <p className="text-slate-500 font-bold text-xl">No se encontraron coincidencias.</p>
                            <p className="text-slate-400 mt-2">No hay registros financieros ni operativos para esta búsqueda.</p>
                         </div>
                    )}

                    {result && (
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 animate-fade-in">
                            {/* Panel CRM Detallado */}
                            <div className="space-y-6">
                                <div className="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                                    <h3 className="font-black text-slate-800 text-lg mb-6 flex items-center gap-2 border-b pb-4"><Activity className="text-indigo-500"/> Estado Operativo B2B (Completo)</h3>
                                    
                                    {result.crm ? (
                                        <>
                                            <div className="grid grid-cols-2 gap-4 mb-6">
                                                <div className="bg-indigo-50 border border-indigo-100 rounded-xl p-5">
                                                    <p className="text-xs font-bold text-indigo-800 uppercase tracking-wider mb-2">Plan Actual B2B</p>
                                                    <p className="text-2xl font-black text-indigo-900">{result.crm.user.plan}</p>
                                                    <div className="mt-3 flex items-center gap-2 text-xs font-medium text-indigo-700 bg-indigo-100/50 px-2 py-1 rounded">
                                                        {result.crm.user.hasUsedTrial ? <CheckCircle2 size={14}/> : <X size={14}/>} {result.crm.user.hasUsedTrial ? 'Usó su Prueba' : 'Nunca usó Prueba'}
                                                    </div>
                                                </div>
                                                <div className="bg-blue-50 border border-blue-100 rounded-xl p-5">
                                                    <p className="text-xs font-bold text-blue-800 uppercase tracking-wider mb-2">Total Pedidos Historicos</p>
                                                    <p className="text-2xl font-black text-blue-900">{result.crm.orders.length}</p>
                                                    <div className="mt-3 flex items-center gap-2 text-xs font-bold text-emerald-700 bg-emerald-100/50 px-2 py-1 rounded">
                                                        <TrendingUp size={14}/> {ordersEnviados.length} Enviados Exitosos
                                                    </div>
                                                </div>
                                            </div>
                                            
                                            <div className="bg-slate-50 p-5 rounded-xl border border-slate-200">
                                                <h4 className="font-bold text-slate-800 mb-4 text-sm flex items-center gap-2"><Database size={16} className="text-slate-500"/> Configuración Completa de su App</h4>
                                                <div className="space-y-3 text-sm">

        };

        // ==========================================
        // MÓDULO FINANZAS
        // ==========================================
        const NetProfitChart = ({ data }) => {
          const chartHeight = 280, chartWidth = 800, paddingX = 65, paddingY = 50; 
          const innerHeight = chartHeight - paddingY * 2, innerWidth = chartWidth - paddingX * 2;
          const minNet = Math.min(...data.map(d => d.net), 0), maxNet = Math.max(...data.map(d => d.net), 100); 
          const rangeNet = maxNet - minNet || 1;
          const getYNet = (val) => chartHeight - paddingY - ((val - minNet) / rangeNet) * innerHeight;
          const getX = (index) => paddingX + (index * (innerWidth / (data.length - 1)));
          const zeroY = getYNet(0);
          const pathNet = `M ${data.map((d, i) => `${getX(i)},${getYNet(d.net)}`).join(' L ')}`;
          const areaNet = `${pathNet} L ${getX(data.length - 1)},${zeroY} L ${getX(0)},${zeroY} Z`;

          return (
            <div className="w-full overflow-x-auto pb-2 relative">
              <div className="min-w-[650px] relative select-none">
                <svg viewBox={`0 0 ${chartWidth} ${chartHeight}`} className="w-full h-auto font-sans overflow-visible">
                  <defs>
                    <linearGradient id="netGradient" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="0%" stopColor="#3b82f6" stopOpacity="0.2" />
                      <stop offset="100%" stopColor="#3b82f6" stopOpacity="0" />
                    </linearGradient>
                  </defs>
                  {[0, 0.25, 0.5, 0.75, 1].map(ratio => {
                     const val = minNet + (rangeNet * ratio);
                     const y = getYNet(val);
                     return (
                       <g key={`l-${ratio}`}>
                         <line x1={paddingX} y1={y} x2={chartWidth - paddingX} y2={y} stroke="#f1f5f9" strokeWidth="1.5" strokeDasharray={val === 0 ? "0" : "4"} />
                         <text x={paddingX - 10} y={y + 4} fontSize="11" fill="#64748b" textAnchor="end" fontWeight="500">
                           {val >= 0 ? `S/ ${Math.round(val)}` : `-S/ ${Math.abs(Math.round(val))}`}
                         </text>
                       </g>
                     )
                  })}
                  <path d={areaNet} fill="url(#netGradient)" />
                  <line x1={paddingX} y1={zeroY} x2={chartWidth - paddingX} y2={zeroY} stroke="#cbd5e1" strokeWidth="2" />
                  <path d={pathNet} fill="none" stroke="#3b82f6" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />
                  {data.map((d, i) => {
                    const x = getX(i);
                    return (
                      <g key={i}>
                        <text x={x} y={chartHeight - 15} fontSize="12" fill="#64748b" textAnchor="middle" fontWeight="500">{d.month}</text>
                        <text x={x} y={getYNet(d.net) - 12} fontSize="11" fill={d.net >= 0 ? "#3b82f6" : "#f43f5e"} textAnchor="middle" fontWeight="bold">
                          {d.net >= 0 ? `S/ ${d.net.toFixed(0)}` : `-S/ ${Math.abs(d.net).toFixed(0)}`}
                        </text>
                        <circle cx={x} cy={getYNet(d.net)} r="5" fill="#ffffff" stroke="#3b82f6" strokeWidth="2" />
                      </g>
                    );
                  })}
                </svg>
              </div>
              <div className="flex justify-center gap-8 mt-6">
                <div className="flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-blue-500 shadow-sm"></div><span className="text-sm font-bold text-slate-800">Utilidad Neta</span></div>
              </div>
            </div>
          );
        };

        const ActiveUsersChart = ({ data }) => {
          const chartHeight = 280, chartWidth = 800, paddingX = 40, paddingY = 50; 
          const innerHeight = chartHeight - paddingY * 2, innerWidth = chartWidth - paddingX * 2;
          const minUsers = 0, maxUsers = Math.max(...data.map(d => d.activeUsers), 10); 
          const rangeUsers = maxUsers - minUsers || 1;
          const getYUsers = (val) => chartHeight - paddingY - ((val - minUsers) / rangeUsers) * innerHeight;
          const getX = (index) => paddingX + (index * (innerWidth / (data.length - 1)));
          const zeroY = getYUsers(0);
          const pathUsers = `M ${data.map((d, i) => `${getX(i)},${getYUsers(d.activeUsers)}`).join(' L ')}`;
          const areaUsers = `${pathUsers} L ${getX(data.length - 1)},${zeroY} L ${getX(0)},${zeroY} Z`;

          return (
            <div className="w-full overflow-x-auto pb-2 relative">
              <div className="min-w-[650px] relative select-none">
                <svg viewBox={`0 0 ${chartWidth} ${chartHeight}`} className="w-full h-auto font-sans overflow-visible">
                  <defs>
                    <linearGradient id="usersGradient" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="0%" stopColor="#8b5cf6" stopOpacity="0.2" />
                      <stop offset="100%" stopColor="#8b5cf6" stopOpacity="0" />
                    </linearGradient>
                  </defs>
                  {[0, 0.25, 0.5, 0.75, 1].map(ratio => {
                     const val = minUsers + (rangeUsers * ratio);
                     const y = getYUsers(val);
                     return (
                       <g key={`l-${ratio}`}>
                         <line x1={paddingX} y1={y} x2={chartWidth - paddingX} y2={y} stroke="#f1f5f9" strokeWidth="1.5" strokeDasharray={val === 0 ? "0" : "4"} />
                         <text x={paddingX - 10} y={y + 4} fontSize="11" fill="#64748b" textAnchor="end" fontWeight="500">{Math.round(val)}</text>
                       </g>
                     )
                  })}
                  <path d={areaUsers} fill="url(#usersGradient)" />
                  <line x1={paddingX} y1={zeroY} x2={chartWidth - paddingX} y2={zeroY} stroke="#cbd5e1" strokeWidth="2" />
                  <path d={pathUsers} fill="none" stroke="#8b5cf6" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />
                  {data.map((d, i) => {
                    const x = getX(i);
                    return (
                      <g key={i}>
                        <text x={x} y={chartHeight - 15} fontSize="12" fill="#64748b" textAnchor="middle" fontWeight="500">{d.month}</text>
                        <text x={x} y={getYUsers(d.activeUsers) - 12} fontSize="11" fill="#8b5cf6" textAnchor="middle" fontWeight="bold">{d.activeUsers}</text>
                        <circle cx={x} cy={getYUsers(d.activeUsers)} r="5" fill="#ffffff" stroke="#8b5cf6" strokeWidth="2" />
                      </g>
                    );
                  })}
                </svg>
              </div>
              <div className="flex justify-center gap-8 mt-6">
                <div className="flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-violet-500 shadow-sm"></div><span className="text-sm font-bold text-slate-800">Usuarios Activos</span></div>
              </div>
            </div>
          );
        };

        const ModalCashFlow = ({ onClose, onSave, isSaving, initialData }) => {
          const isEdit = !!initialData;
          const initialType = isEdit ? (initialData.income > 0 ? 'ingreso' : 'egreso') : 'ingreso';
          const [type, setType] = useState(initialType);
          
          const getInitialCategory = () => {
             if (!isEdit) return 'Ventas SaaS (Formal)';
             let cat = initialData.category;
             if (!cat) return initialType === 'ingreso' ? ((initialData.voucher || '').includes('Pendiente') ? 'Ventas SaaS (Informal)' : 'Ventas SaaS (Formal)') : 'Egresos Generales';
             if (cat === 'SaaS (Ingresos)' || cat === 'SaaS') return 'Ventas SaaS (Formal)';
             if (cat === 'Informal (Ingresos)' || cat === 'Informal') return 'Ventas SaaS (Informal)';
             return cat;
          };
          
          const [category, setCategory] = useState(getInitialCategory());
          
          let initMonths = 1;
          if (isEdit && initialData.concept) {
             const match = initialData.concept.match(/x\s*(\d+)\s*mes/i);
             if (match) initMonths = parseInt(match[1], 10);
          }
          const [months, setMonths] = useState(initMonths);
          
          const getLocalToday = () => {
             const d = new Date();
             d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
             return d.toISOString().split('T')[0];
          };
          const [date, setDate] = useState(isEdit ? initialData.date : getLocalToday());
          const [voucherType, setVoucherType] = useState(isEdit ? (initialData.voucher || 'Pendiente / Sin Comprobante') : 'Pendiente / Sin Comprobante');
          const [promoBienvenida, setPromoBienvenida] = useState(false);
          const [manualConcept, setManualConcept] = useState(isEdit ? initialData.concept : 'Suscripción x 1 mes');
          
          const initAmount = isEdit ? (initialData.income > 0 ? initialData.income : initialData.expense).toString() : '49.90';
          const [manualAmount, setManualAmount] = useState(initAmount);
          const isSaasCategory = category === 'Ventas SaaS (Formal)' || category === 'Ventas SaaS (Informal)';

          const handleTypeChange = (newType) => {
            setType(newType);
            if (newType === 'ingreso') {
              setCategory('Ventas SaaS (Formal)'); setMonths(1); setPromoBienvenida(false); setManualAmount('49.90'); setManualConcept('Suscripción x 1 mes');
            } else {
              setCategory('Egresos Generales'); setManualAmount(''); setManualConcept('');
            }
          };

          const handleCategoryChange = (e) => {
            const newCat = e.target.value; setCategory(newCat);
            if (type === 'ingreso' && !newCat.includes('SaaS')) { setManualAmount(''); setManualConcept(''); } 
            else if (type === 'ingreso' && newCat.includes('SaaS')) { handleMonthsChange(months); }
          };

          const handleMonthsChange = (newMonths) => {
            setMonths(newMonths);
            if (type === 'ingreso' && isSaasCategory) {
              setManualConcept(`Suscripción x ${newMonths} mes${newMonths > 1 ? 'es' : ''}`);
              if (newMonths === 1) setManualAmount(promoBienvenida ? '29.90' : '49.90');
              else if (newMonths === 6) setManualAmount('269.90'); 
              else if (newMonths === 12) setManualAmount('499.90'); 
              else setManualAmount((49.90 * newMonths).toFixed(2)); 
            }
          };

          const handlePromoChange = (isPromo) => {
            setPromoBienvenida(isPromo);
            if (type === 'ingreso' && months === 1 && isSaasCategory) {
              setManualAmount(isPromo ? '29.90' : '49.90');
            }
          };

          const handleSubmit = (e) => {
            e.preventDefault();
            if (isSaving) return;
            const formData = new FormData(e.target);
            onSave({
              id: isEdit ? initialData.id : null,
              date: formData.get('date') || date, client: formData.get('client') || '', concept: manualConcept, category: category,
              income: type === 'ingreso' ? Number(manualAmount) : 0, expense: type === 'egreso' ? Number(manualAmount) : 0,
              method: formData.get('method') || 'Yape', voucher: voucherType, voucherUrl: formData.get('voucherUrl') || '', notes: formData.get('notes') || '', months: Number(months)
            });
          };

          return (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-[200] animate-fade-in">
              <div className="bg-white rounded-xl shadow-xl w-full max-w-md flex flex-col max-h-[95vh] overflow-hidden">
                <div className="flex justify-between items-center p-4 border-b bg-slate-50 shrink-0">
                  <h3 className="font-semibold text-lg text-slate-800 flex items-center gap-2">
                    <Wallet className="text-blue-600" size={20} /> {isEdit ? 'Editar Registro' : 'Registro de Caja'}
                  </h3>
                  <button onClick={onClose} disabled={isSaving} className="text-slate-400 hover:text-slate-600 transition-colors disabled:opacity-50"><X size={20} /></button>
                </div>
                
                <form onSubmit={handleSubmit} className="p-4 space-y-4 overflow-y-auto">
                  <div className="flex bg-slate-100 p-1 rounded-lg">
                    <button type="button" onClick={() => handleTypeChange('ingreso')} disabled={isSaving || isEdit} className={`flex-1 py-1.5 text-sm font-medium rounded-md transition-colors ${type === 'ingreso' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500 hover:text-slate-700'} disabled:opacity-50`}>Ingreso</button>
                    <button type="button" onClick={() => handleTypeChange('egreso')} disabled={isSaving || isEdit} className={`flex-1 py-1.5 text-sm font-medium rounded-md transition-colors ${type === 'egreso' ? 'bg-white shadow-sm text-rose-600' : 'text-slate-500 hover:text-slate-700'} disabled:opacity-50`}>Egreso</button>
                  </div>

                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-1">Categoría</label>
                    <select value={category} onChange={handleCategoryChange} disabled={isSaving} className="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none disabled:bg-slate-100 font-medium">
                      {type === 'ingreso' ? (
                        <><optgroup label="Suscripciones (Activan servicio)"><option value="Ventas SaaS (Formal)">Ventas SaaS (Formales)</option><option value="Ventas SaaS (Informal)">Ventas SaaS (Informales)</option></optgroup>
                          <optgroup label="Otros Ingresos (No activan servicio)"><option value="Capital Inicial">Capital Inicial</option><option value="Préstamo de Socios">Préstamo de Socios</option><option value="Otros Ingresos">Otros Ingresos</option></optgroup>
                        </>
                      ) : (
                        <><option value="Servidores / APIs">Servidores / APIs</option><option value="Marketing y Publicidad">Marketing y Publicidad</option><option value="Planilla / Honorarios">Planilla / Honorarios</option><option value="Impuestos">Impuestos</option><option value="Comisiones">Comisiones (Bancarias / Ventas)</option><option value="Egresos Generales">Egresos Generales / Otros</option></>
                      )}
                    </select>
                  </div>

                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-sm font-medium text-slate-700 mb-1">Fecha</label>
                      <input required type="date" name="date" value={date} onChange={e => setDate(e.target.value)} disabled={isSaving} className="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none disabled:bg-slate-100" />
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-slate-700 mb-1">Cliente / Referencia</label>
                      <input required type="text" name="client" defaultValue={isEdit ? initialData.client : ''} placeholder={type === 'ingreso' ? "Ej. 987654321" : "Ej. Facebook Ads..."} disabled={isSaving} className="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none disabled:bg-slate-100" />
                    </div>
                  </div>

                  {type === 'ingreso' && isSaasCategory && (
                    <div className="bg-blue-50 border border-blue-100 p-3 rounded-lg space-y-3">
                      <div className="flex items-center justify-between">
                        <label className="text-sm font-semibold text-blue-800 flex items-center gap-1">
                          <Zap size={16} className="text-amber-500 fill-amber-500" /> Meses a pagar
                        </label>
                        <div className="flex items-center gap-2">
                          <button type="button" onClick={() => handleMonthsChange(Math.max(1, months - 1))} disabled={isSaving} className="w-8 h-8 rounded-full bg-white text-blue-600 shadow-sm font-bold border hover:bg-blue-100 disabled:opacity-50">-</button>
                          <span className="w-4 text-center font-bold text-slate-700">{months}</span>
                          <button type="button" onClick={() => handleMonthsChange(months + 1)} disabled={isSaving} className="w-8 h-8 rounded-full bg-white text-blue-600 shadow-sm font-bold border hover:bg-blue-100 disabled:opacity-50">+</button>
                        </div>
                      </div>
                      
                      {months === 1 && (
                        <label className="flex items-center gap-2 cursor-pointer group animate-fade-in">
                          <input type="checkbox" checked={promoBienvenida} onChange={e => handlePromoChange(e.target.checked)} disabled={isSaving} className="w-4 h-4 text-blue-600 rounded border-blue-300 focus:ring-blue-500 disabled:opacity-50" />
                          <span className="text-sm font-bold text-blue-800 leading-tight">Promo Bienvenida (S/ 29.90)</span>
                        </label>
                      )}
                      <p className="text-xs text-blue-800 leading-tight border-t border-blue-200/50 pt-2 mt-2">
                        El sistema detectará que dice <b>"x {months} mes"</b> y extenderá la suscripción automáticamente.
                      </p>
                    </div>
                  )}

                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-1">Concepto</label>
                    <input required type="text" name="concept" value={manualConcept} onChange={(e) => setManualConcept(e.target.value)} disabled={isSaving} className="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50 disabled:bg-slate-100" />
                  </div>

                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-sm font-medium text-slate-700 mb-1">Monto (S/)</label>
                      <input required type="number" step="0.01" name="amount" value={manualAmount} onChange={(e) => setManualAmount(e.target.value)} disabled={isSaving} className={`w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none font-bold ${type === 'ingreso' ? 'text-emerald-600' : 'text-rose-600'} disabled:bg-slate-100`} />
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-slate-700 mb-1">Comprobante</label>
                      <select name="voucher" value={voucherType} onChange={(e) => setVoucherType(e.target.value)} disabled={isSaving} className="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none disabled:bg-slate-100">
                        <option>Pendiente / Sin Comprobante</option><option>Boleta</option><option>Factura</option>
                      </select>
                    </div>
                  </div>

                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-sm font-medium text-slate-700 mb-1">Método de Pago</label>
                      <select name="method" defaultValue={isEdit ? initialData.method : 'Yape'} disabled={isSaving} className="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none disabled:bg-slate-100">
                        <option value="Yape">Yape</option><option value="Transferencia BCP">Transferencia BCP</option><option value="Transferencia Interbank">Transferencia Interbank</option><option value="Efectivo">Efectivo</option>
                      </select>
                    </div>
                    <div></div>
                  </div>

                  {voucherType !== 'Pendiente / Sin Comprobante' && (
                    <div className="animate-fade-in">
                      <label className="block text-sm font-medium text-slate-700 mb-1">URL del Comprobante</label>
                      <div className="flex relative">
                        <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><ExternalLink size={16} className="text-slate-400" /></div>
                        <input type="url" name="voucherUrl" defaultValue={isEdit ? initialData.voucherUrl : ''} placeholder="https://..." disabled={isSaving} className="w-full border rounded-lg py-2 pl-10 pr-2 focus:ring-2 focus:ring-blue-500 outline-none text-sm disabled:bg-slate-100" />
                      </div>
                    </div>
                  )}

                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-1">Notas / Observaciones</label>
                    <input type="text" name="notes" defaultValue={isEdit ? initialData.notes : ''} placeholder="Opcional..." disabled={isSaving} className="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50 disabled:bg-slate-100" />
                  </div>
                  
                  <div className="pt-4 border-t flex justify-end gap-2 mt-2">
                    <button type="button" onClick={onClose} disabled={isSaving} className="px-4 py-2 text-slate-600 bg-slate-100 rounded-lg hover:bg-slate-200 transition-colors disabled:opacity-50">Cancelar</button>
                    <button type="submit" disabled={isSaving} className={`px-4 py-2 text-white rounded-lg transition-colors flex items-center gap-2 ${type === 'ingreso' ? 'bg-emerald-600 hover:bg-emerald-700' : 'bg-rose-600 hover:bg-rose-700'} disabled:opacity-75`}>
                      {isSaving ? <Loader2 className="animate-spin" size={18} /> : null}
                      {isSaving ? 'Guardando...' : (isEdit ? 'Actualizar' : 'Guardar')}
                    </button>
                  </div>
                </form>
              </div>
            </div>
          );
        };

        const FinanceModule = ({ activeSubTab, setNotification, cashFlow, setCashFlow }) => {
          const [showCashFlowModal, setShowCashFlowModal] = useState(false);
          const [editingRecord, setEditingRecord] = useState(null);
          const [isSaving, setIsSaving] = useState(false);
          const [isFetchingData, setIsFetchingData] = useState(false);
          const [scriptUrl, setScriptUrl] = useState('');
          const [tempScriptUrl, setTempScriptUrl] = useState('');

          const [filterMonth, setFilterMonth] = useState(() => {
            const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
          });
          const [activeFilter, setActiveFilter] = useState(null);
          const [cashFlowSearch, setCashFlowSearch] = useState('');
          const [cashFlowTypeFilter, setCashFlowTypeFilter] = useState('ALL');
          const [subSearch, setSubSearch] = useState('');
          const [subFilter, setSubFilter] = useState('ALL');

          useEffect(() => { setActiveFilter(null); }, [filterMonth]);

          const showMessage = (msg, type = 'success') => setNotification({ msg, type });

          const loadDataFromSheets = async (url) => {
            if (!url) return;
            setIsFetchingData(true);
            try {
              const response = await fetch(url);
              if (!response.ok) throw new Error("Error HTTP");
              const data = await response.json();
              if (data.cashFlow) {
                const parsedCashFlow = data.cashFlow.map(item => {
                  const monto = Number(item.monto) || 0;
                  let rawCategory = item.category;
                  let resolvedCategory = rawCategory;
                  
                  if (!rawCategory) {
                     if (monto >= 0) {
                        resolvedCategory = (item.voucher === 'Pendiente / Sin Comprobante' || item.voucher === 'Pendiente') ? 'Ventas SaaS (Informal)' : 'Ventas SaaS (Formal)';
                     } else {
                        resolvedCategory = 'Egresos Generales';
                     }
                  } else if (rawCategory === 'SaaS (Ingresos)' || rawCategory === 'SaaS') {
                     resolvedCategory = 'Ventas SaaS (Formal)';
                  } else if (rawCategory === 'Informal (Ingresos)' || rawCategory === 'Informal') {
                     resolvedCategory = 'Ventas SaaS (Informal)';
                  }

                  return {
                    id: item.id || Date.now() + Math.random(), 
                    date: item.date ? String(item.date).split('T')[0] : '',
                    client: String(item.client || ''), 
                    concept: String(item.concept || ''),
                    category: resolvedCategory,
                    income: monto > 0 ? monto : 0, 
                    expense: monto < 0 ? Math.abs(monto) : 0,
                    method: String(item.method || ''), 
                    voucher: String(item.voucher || ''), 
                    voucherUrl: item.voucherUrl || '', 
                    notes: item.notes || ''
                  };
                });
                setCashFlow(parsedCashFlow);
              }
              showMessage('Base sincronizada correctamente.', 'success');
            } catch (error) {
              showMessage('Error de conexión a Sheets.', 'error');
            } finally { setIsFetchingData(false); }
          };

          useEffect(() => {
            const savedUrl = localStorage.getItem('gestorpro_script_url') || '';
            setScriptUrl(savedUrl); setTempScriptUrl(savedUrl);
            if (savedUrl) loadDataFromSheets(savedUrl);
          }, []);

          const sendToGoogleSheets = async (action, payload) => {
            if (!scriptUrl || scriptUrl.trim() === '') return true;
            try {
              await fetch(scriptUrl, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action, payload }) });
              return true;
            } catch (error) { return false; }
          };

          const handleSaveConfig = () => {
            setScriptUrl(tempScriptUrl); localStorage.setItem('gestorpro_script_url', tempScriptUrl);
            if (tempScriptUrl) { loadDataFromSheets(tempScriptUrl); } else { showMessage('URL desconectada. Modo local activado.'); setCashFlow([]); }
          };

          const cashFlowWithBalance = useMemo(() => {
            let currentBalance = 0;
            const sorted = [...cashFlow].sort((a, b) => new Date(a.date) - new Date(b.date));
            return sorted.map(item => { currentBalance += (Number(item.income) || 0) - (Number(item.expense) || 0); return { ...item, balance: currentBalance }; }).reverse();
          }, [cashFlow]);

          const displayedCashFlow = useMemo(() => {
             return cashFlowWithBalance.filter(item => {
                const term = cashFlowSearch.toLowerCase();
                const matchesSearch = item.client.toLowerCase().includes(term) || item.concept.toLowerCase().includes(term);
                const matchesType = cashFlowTypeFilter === 'ALL' || (cashFlowTypeFilter === 'INCOME' && item.income > 0) || (cashFlowTypeFilter === 'EXPENSE' && item.expense > 0);
                return matchesSearch && matchesType;
             });
          }, [cashFlowWithBalance, cashFlowSearch, cashFlowTypeFilter]);

          const derivedSubscriptions = useMemo(() => {
            const subsMap = {};
            const sortedCashFlow = [...cashFlow].sort((a, b) => new Date(a.date) - new Date(b.date));
            sortedCashFlow.forEach(entry => {
              if (entry.income > 0 && entry.client) {
                const conceptStr = String(entry.concept || '');
                const match = conceptStr.match(/x\s*(\d+)\s*mes/i);
                const months = match ? parseInt(match[1]) : 0;
                const isSaas = entry.category && entry.category.includes('SaaS');
                const wasFormalOrInformalBeforeUpdate = !entry.category && entry.voucher; 
                if (months > 0 && (isSaas || wasFormalOrInformalBeforeUpdate)) {
                  if (!subsMap[entry.client]) {
                    subsMap[entry.client] = { client: entry.client, startDate: entry.date, endDate: addMonthsToDate(entry.date, months), activeMonths: months, notes: entry.notes || '' };
                  } else {
                    const existing = subsMap[entry.client];
                    const baseDate = new Date(existing.endDate) > new Date(entry.date) ? existing.endDate : entry.date;
                    subsMap[entry.client] = { ...existing, endDate: addMonthsToDate(baseDate, months), activeMonths: existing.activeMonths + months, notes: entry.notes ? entry.notes : existing.notes };
                  }
                }
              }
            });
            return Object.values(subsMap).map(sub => {
              const { remainingDays, status } = calculateSubStatus(sub.endDate);
              return { ...sub, remainingDays, status };
            }).sort((a, b) => a.remainingDays - b.remainingDays);
          }, [cashFlow]);

          const subMetrics = useMemo(() => {
             let expired = 0; let warning = 0; let active = 0;
             derivedSubscriptions.forEach(s => {
                 if (s.remainingDays < 0) expired++;
                 else if (s.remainingDays >= 0 && s.remainingDays <= 5) warning++;
                 else active++;
             });
             return { expired, warning, active };
          }, [derivedSubscriptions]);

          const displayedSubs = useMemo(() => {
              return derivedSubscriptions.filter(sub => {
                  const matchesSearch = sub.client.toLowerCase().includes(subSearch.toLowerCase());
                  let matchesFilter = true;
                  if (subFilter === 'EXPIRED') matchesFilter = sub.remainingDays < 0;
                  else if (subFilter === 'WARNING') matchesFilter = sub.remainingDays >= 0 && sub.remainingDays <= 5;
                  else if (subFilter === 'ACTIVE') matchesFilter = sub.remainingDays > 5;
                  return matchesSearch && matchesFilter;
              });
          }, [derivedSubscriptions, subSearch, subFilter]);

          const monthlyData = useMemo(() => {
            const months = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];
            const targetYear = parseInt(filterMonth.split('-')[0], 10);
            const data = months.map(m => ({ month: m, net: 0 }));
            for (let i = 0; i < 12; i++) {
              let net = 0;
              const monthItems = cashFlow.filter(item => {
                if(!item.date) return false;
                const d = new Date(item.date + 'T00:00:00');
                return d.getFullYear() === targetYear && d.getMonth() === i;
              });
              monthItems.forEach(item => { net += (Number(item.income) || 0) - (Number(item.expense) || 0); });
              data[i].net = net;
            }
            return data;
          }, [cashFlow, filterMonth]);

          const monthlyActiveUsersData = useMemo(() => {
            const months = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];
            const targetYear = parseInt(filterMonth.split('-')[0], 10);
            const data = months.map(m => ({ month: m, activeUsers: 0 }));
            for (let i = 0; i < 12; i++) {
              const monthStart = new Date(targetYear, i, 1);
              const monthEnd = new Date(targetYear, i + 1, 0); 
              let activeCount = 0;
              derivedSubscriptions.forEach(sub => {
                if (!sub.startDate || !sub.endDate) return;
                const subStart = new Date(sub.startDate + 'T00:00:00');
                const subEnd = new Date(sub.endDate + 'T00:00:00');
                if (subStart <= monthEnd && subEnd >= monthStart) activeCount++;
              });
              data[i].activeUsers = activeCount;
            }
            return data;
          }, [derivedSubscriptions, filterMonth]);

          const metrics = useMemo(() => {
            const [targetYearStr, targetMonthStr] = filterMonth.split('-');
            const targetYear = parseInt(targetYearStr, 10); const targetMonth = parseInt(targetMonthStr, 10) - 1;
            let pMonth = targetMonth - 1; let pYear = targetYear;
            if (pMonth < 0) { pMonth = 11; pYear -= 1; }

            let globalIncome = 0; let globalExpense = 0;
            let prevMonthIncome = 0; let prevMonthExpense = 0;
            let monthlyIncome = 0; let monthlyExpense = 0;
            let monthlySaaSIncome = 0; let monthlyOtherIncome = 0;
            let monthlyCommissionExpense = 0; let monthlyOtherExpense = 0;

            cashFlow.forEach(item => {
              const inc = Number(item.income) || 0; const exp = Number(item.expense) || 0;
              const categoryStr = String(item.category || ''); const voucherStr = String(item.voucher || '');
              globalIncome += inc; globalExpense += exp;

              const d = item.date ? new Date(item.date + 'T00:00:00') : null;
              if (d) {
                const itemMonth = d.getMonth(); const itemYear = d.getFullYear();
                if (itemMonth === targetMonth && itemYear === targetYear) {
                  monthlyIncome += inc; monthlyExpense += exp;
                  if (inc > 0) {
                    if (categoryStr.includes('SaaS') || (!categoryStr && voucherStr !== 'Pendiente')) monthlySaaSIncome += inc;
                    else monthlyOtherIncome += inc;
                  }
                  if (exp > 0) {
                     if (categoryStr.toLowerCase().includes('comision') || categoryStr.toLowerCase().includes('comisión')) monthlyCommissionExpense += exp;
                     else monthlyOtherExpense += exp;
                  }
                }
                if (itemMonth === pMonth && itemYear === pYear) {
                    prevMonthIncome += inc; prevMonthExpense += exp;
                }
              }
            });

            return { 
              globalNetProfit: globalIncome - globalExpense, prevMonthNetProfit: prevMonthIncome - prevMonthExpense,
              monthlyIncome, monthlySaaSIncome, monthlyOtherIncome, monthlyExpense, monthlyCommissionExpense, monthlyOtherExpense, netProfit: monthlyIncome - monthlyExpense
            };
          }, [cashFlow, filterMonth]);

          const filteredDetails = useMemo(() => {
            if (!activeFilter) return [];
            const [targetYearStr, targetMonthStr] = filterMonth.split('-');
            const targetYear = parseInt(targetYearStr, 10); const targetMonth = parseInt(targetMonthStr, 10) - 1;

            return cashFlow.filter(item => {
                const d = item.date ? new Date(item.date + 'T00:00:00') : null;
                if (!d || d.getMonth() !== targetMonth || d.getFullYear() !== targetYear) return false;
                const inc = Number(item.income) || 0; const exp = Number(item.expense) || 0;
                const categoryStr = String(item.category || ''); const voucherStr = String(item.voucher || '');

                if (activeFilter === 'SAAS_INCOME') return inc > 0 && (categoryStr.includes('SaaS') || (!categoryStr && voucherStr !== 'Pendiente'));
                if (activeFilter === 'OTHER_INCOME') return inc > 0 && !(categoryStr.includes('SaaS') || (!categoryStr && voucherStr !== 'Pendiente'));
                if (activeFilter === 'COMMISSION_EXPENSE') return exp > 0 && (categoryStr.toLowerCase().includes('comision') || categoryStr.toLowerCase().includes('comisión'));
                if (activeFilter === 'OTHER_EXPENSE') return exp > 0 && !(categoryStr.toLowerCase().includes('comision') || categoryStr.toLowerCase().includes('comisión'));
                return false;
            }).sort((a,b) => new Date(b.date) - new Date(a.date));
          }, [cashFlow, filterMonth, activeFilter]);

          const handleSaveCashFlow = async (data) => {
            setIsSaving(true);
            const isUpdate = !!data.id;
            const cashEntryId = isUpdate ? data.id : Date.now();
            const montoCashFlow = data.income > 0 ? data.income : -data.expense;

            const newCashEntry = { 
                id: cashEntryId, date: data.date, client: data.client, concept: data.concept, monto: montoCashFlow,
                method: data.method, voucher: data.voucher, voucherUrl: data.voucherUrl, notes: data.notes, category: data.category,
                income: data.income || 0, expense: data.expense || 0
            };

            if (isUpdate) setCashFlow(prev => prev.map(item => String(item.id) === String(newCashEntry.id) ? newCashEntry : item));
            else setCashFlow(prev => [...prev, newCashEntry]);
            
            if (!scriptUrl || scriptUrl.trim() === '') {
              setIsSaving(false); setShowCashFlowModal(false); showMessage(isUpdate ? 'Editado localmente.' : 'Guardado localmente.');
              return;
            }

            const action = isUpdate ? 'updateCashFlow' : 'saveCashFlow';
            const cashFlowSuccess = await sendToGoogleSheets(action, newCashEntry);
            
            setIsSaving(false); setShowCashFlowModal(false);
            if (cashFlowSuccess) showMessage(isUpdate ? 'Actualizado en Google Sheets.' : 'Sincronizado con Google Sheets.');
            else showMessage('Guardado localmente, pero falló la conexión con Sheets.', 'error');
          };

          return (
            <div className="animate-fade-in max-w-7xl mx-auto space-y-6">
              {isFetchingData && (
                <div className="fixed top-4 left-1/2 -translate-x-1/2 z-50 bg-blue-600 text-white shadow-xl rounded-full px-6 py-2 flex items-center gap-3 animate-fade-in">
                  <RefreshCw className="animate-spin" size={18} />
                  <p className="text-sm font-medium">Sincronizando con base de datos...</p>
                </div>
              )}
              {showCashFlowModal && <ModalCashFlow onClose={() => setShowCashFlowModal(false)} onSave={handleSaveCashFlow} isSaving={isSaving} initialData={editingRecord} />}
              
              {/* VISTA DASHBOARD */}
              {activeSubTab === 'dashboard' && (
                <div className="space-y-6">
                  <header className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                    <div>
                      <h2 className="text-2xl font-bold text-slate-800">Resumen General</h2>
                      <p className="text-slate-500">Analiza el rendimiento de tu negocio.</p>
                      {!scriptUrl && (
                        <div className="mt-4 p-3 bg-amber-50 border border-amber-200 text-amber-800 rounded-lg text-sm flex items-start gap-2">
                            <AlertCircle size={16} className="mt-0.5 shrink-0" />
                            <p><strong>Modo Local:</strong> La base de datos no está conectada. Ve a <b>Configuración</b> para sincronizar con Google Sheets.</p>
                        </div>
                      )}
                    </div>
                    <div className="flex items-center gap-3 bg-white px-4 py-2.5 rounded-xl border border-slate-200 shadow-sm transition-all hover:shadow-md">
                      <Calendar size={18} className="text-blue-600" />
                      <input type="month" value={filterMonth} onChange={(e) => { if (e.target.value) setFilterMonth(e.target.value); }} className="outline-none border-none bg-transparent text-slate-700 font-bold cursor-pointer" />
                    </div>

        const CrmModule = ({ setNotification, kpis, setKpis }) => {
          const [excelFile, setExcelFile] = useState(null);
          const [loading, setLoading] = useState(false);
          const [error, setError] = useState('');

          const procesarDatos = async () => {
            if (!excelFile) { setError("Por favor, sube el archivo Excel (.xlsx) para generar el reporte completo."); return; }
            if (!window.XLSX) { setError("La librería de Excel se está cargando. Intenta de nuevo en un segundo."); return; }

            setLoading(true); setError('');

            try {
              const reader = new FileReader();
              reader.onload = (e) => {
                try {
                  const data = new Uint8Array(e.target.result);
                  const workbook = window.XLSX.read(data, { type: 'array', cellDates: true });

                  const getSheetData = (namePart) => {
                    const sheetName = workbook.SheetNames.find(n => n.toLowerCase().includes(namePart.toLowerCase()));
                    if (!sheetName) return null;
                    return window.XLSX.utils.sheet_to_json(workbook.Sheets[sheetName], { defval: "" });
                  };

                  const usersData = getSheetData('user') || getSheetData('usuario');
                  const configData = getSheetData('config');
                  const ordersData = getSheetData('order') || getSheetData('orden');
                  const backlogData = getSheetData('backlog') || getSheetData('historico');

                  if (!usersData || !configData || !ordersData || !backlogData) {
                    setError(`El Excel no contiene las 4 hojas necesarias. Asegúrate de tener: Users, Config, Orders, Backlog.`);
                    setLoading(false); return;
                  }

                  // 1. Mapeo de Usuarios
                  const usersMap = {}; const planes = {};
                  const proPagadosIDs = new Set(); const proPruebaIDs = new Set();
                  const gratisUsadoIDs = new Set(); const gratisNuevoIDs = new Set();

                  usersData.forEach(u => {
                    const plan = (u.Plan || 'Desconocido').trim();
                    const hasUsedTrial = String(u.HasUsedTrial || '').trim().toLowerCase() === 'true';
                    const id = u.UID || u.MerchantID || u.id;
                    const phone = String(u.Phone || u.Telefono || u.whatsapp || '');

                    const dCreated = parseSafeDate(u.CreatedAt || u.createdat || u.Fecha);
                    let createdAtMonth = null; let createdAtFormatted = 'N/A';

        // MÓDULO 3: PARSER DE ESTADOS DE CUENTA
